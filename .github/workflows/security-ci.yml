name: Security CI

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root deps
        run: npm ci

      - name: Root dependency audit (high+)
        run: npm audit --audit-level=high

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Backend dependency audit (high+)
        working-directory: backend
        run: npm audit --audit-level=high

  sast-semgrep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/owasp-top-ten

  dast-zap-baseline:
    runs-on: ubuntu-latest
    needs: [dependency-audit]
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://localhost:27017/ticketpro
      JWT_SECRET: this_is_a_ci_secret_key_with_32_chars_min
      CLIENT_URL: http://localhost:5173
      ENFORCE_HTTPS: "false"
      ENABLE_PUBLIC_UPLOADS: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Start backend
        working-directory: backend
        run: |
          nohup npm start > backend.log 2>&1 &
          for i in {1..20}; do
            if curl -fsS http://localhost:5000/api/health >/dev/null; then
              echo "Backend is healthy"
              break
            fi
            if [ "$i" -eq 20 ]; then
              echo "Backend failed to start"
              cat backend.log
              exit 1
            fi
            sleep 2
          done

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.13.0
        with:
          target: http://localhost:5000
          fail_action: true

      - name: Upload backend log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: backend/backend.log
